name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ApiEcommerce.csproj

      - name: Build
        run: dotnet build ApiEcommerce.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ApiEcommerce.Tests/ApiEcommerce.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish app
        run: dotnet publish ApiEcommerce.csproj -c Release -o publish --no-build