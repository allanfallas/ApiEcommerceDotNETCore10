name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ApiEcommerce/ApiEcommerce.csproj

      - name: Build
        run: dotnet build ApiEcommerce/ApiEcommerce.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ApiEcommerce.Tests/ApiEcommerce.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish app
        run: dotnet publish ApiEcommerce/ApiEcommerce.csproj -c Release -o publish --no-build

      - name: Docker login
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./ApiEcommerce
          file: ./ApiEcommerce/Dockerfile
          push: true
          tags: docker.io/${{ secrets.DOCKER_USERNAME }}/apiecommerce:latest
